<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Wordle Calculator</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<main class="app">
			<h1 class="title">Wordle Calculator</h1>

			<section class="solution-section">
				<label for="solution-input" class="solution-label">
					Solution
				</label>
				<input
					id="solution-input"
					type="text"
					class="solution-input"
					placeholder="Enter solution word"
					maxlength="5"
				/>
			</section>

			<section class="grid-section">
				<div id="wordle-grid" class="wordle-grid"></div>
			</section>
		</main>

		<script type="module" src="./index.ts"></script>
	</body>
</html>
